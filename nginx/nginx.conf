# Single-origin edge for the whole platform.
# Browser talks only to :8080 — no CORS in the happy path, cookies stay first-party.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream scm_web { server web:3000; }
upstream scm_api { server api:4000; }

server {
    listen 80;
    server_name _;
    client_max_body_size 10m; # driver document uploads

    # REST API
    location /api/ {
        proxy_pass http://scm_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO — long-lived upgraded connections
    location /socket.io/ {
        proxy_pass http://scm_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s; # comfortably above socket.io ping interval
        proxy_send_timeout 120s;
    }

    # Driver verification documents (disk storage mode)
    location /uploads/ {
        proxy_pass http://scm_api;
        proxy_set_header Host $host;
    }

    # Next.js app
    location / {
        proxy_pass http://scm_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
