# Render Blueprint — provisions the Smart Campus Mobility backend.
# Dashboard: New > Blueprint > connect this repo > pick the `deploy` branch > Apply.
# Render reads this file and creates: the API web service (from server/Dockerfile),
# a managed Postgres, and a managed Redis (Key Value) — wiring DATABASE_URL /
# REDIS_URL and generating the JWT secrets automatically.
#
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: scm-postgres
    databaseName: scm
    user: scm
    plan: free # free Postgres is wiped after ~30 days — upgrade for anything lasting
    region: singapore

services:
  # ---- Redis (Key Value) — Socket.IO adapter, BullMQ queues, driver geo-index ----
  - type: redis
    name: scm-redis
    plan: free
    region: singapore
    ipAllowList: [] # internal connections only (the API reaches it on the private network)
    maxmemoryPolicy: noeviction # required by BullMQ — never evict queued jobs

  # ---- API — Express + Socket.IO + BullMQ workers, one process ----
  - type: web
    name: scm-api
    runtime: docker
    branch: deploy
    region: singapore
    plan: free # free web services sleep after ~15 min idle; first request cold-starts
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: scm-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: scm-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true # Render generates a long random value (well over the 16-char minimum)
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # Browser origin allowed to call the API with credentials — the Vercel frontend.
      # Update this if you add a custom domain.
      - key: CORS_ORIGINS
        value: https://web-gamma-blush-14.vercel.app
