name: smart-campus-mobility

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: scm
      POSTGRES_PASSWORD: scm
      POSTGRES_DB: scm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U scm -d scm']
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build: ./server
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://scm:scm@postgres:5432/scm
      REDIS_URL: redis://redis:6379
      # Demo-only secrets — rotate before any real deployment.
      JWT_ACCESS_SECRET: dev-access-secret-change-me-please
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me-too
      CORS_ORIGINS: http://localhost:3000,http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    ports:
      - '4000:4000' # direct API access for curl/Postman; the app itself goes through nginx

  web:
    build:
      context: ./web
      args:
        # Inlined into the browser bundle: everything flows through the nginx edge.
        NEXT_PUBLIC_API_URL: http://localhost:8080
        NEXT_PUBLIC_SOCKET_URL: http://localhost:8080
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - '8080:80'
    depends_on:
      - web
      - api

volumes:
  pgdata:
  uploads:
